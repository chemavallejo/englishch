<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenamiento de inglés</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:1100px;margin:auto}
h1{margin-top:0}
select{padding:8px;border-radius:6px;border:none;margin-top:6px;min-width:150px}
button{padding:10px 14px;margin:6px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.show{background:#e5e7eb;color:black}
.ok{background:#22c55e;color:white}
.bad{background:#ef4444;color:white}
.listen{background:#3b82f6;color:white}
.speak{background:#a855f7;color:white}
.stats{margin-top:15px;font-size:14px;color:#94a3b8}
.progressContainer{margin-top:12px;background:#0b1220;border-radius:8px;overflow:hidden;height:12px}
.progressBar{height:12px;width:0%;background:#38bdf8;transition:width .3s}
.message{margin-top:10px;font-size:14px;color:#facc15;min-height:18px}
.mainText{font-size:20px;font-weight:bold;line-height:1.5;margin-top:14px;white-space:pre-line}
.answer{margin-top:12px;font-size:18px;color:#cbd5f5;white-space:pre-line}
.feedbackBox{margin-top:14px;padding:12px;border-radius:10px;background:#0b1220}
.score{margin-top:8px;font-size:16px;font-weight:bold;white-space:pre-line}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:end;margin-bottom:8px}
.controlGroup{display:flex;flex-direction:column}
label{font-size:14px;color:#cbd5f5;margin-bottom:4px}
.small{font-size:13px;color:#94a3b8}
</style>
</head>

<body>

<div class="card">

<h1>Entrenamiento de inglés</h1>

<div class="controls">
  <div class="controlGroup">
    <label>Fuente:</label>
    <select id="sourceSelect">
      <option value="frases">FRASES</option>
      <option value="textos">TEXTOS</option>
    </select>
  </div>

  <div class="controlGroup">
    <label>Capítulo:</label>
    <select id="blockSelect"></select>
  </div>

  <div class="controlGroup">
    <label>Modo:</label>
    <select id="modeSelect">
      <option value="es_en">Español → Inglés</option>
      <option value="en_es">Listening Inglés → Español</option>
    </select>
  </div>

  <div class="controlGroup">
    <label>Velocidad:</label>
    <select id="speedSelect">
      <option value="0.6">Muy lento</option>
      <option value="0.8">Lento</option>
      <option value="1" selected>Normal</option>
      <option value="1.15">Rápido</option>
      <option value="1.3">Muy rápido</option>
    </select>
  </div>

  <div class="controlGroup">
    <label>Voz:</label>
    <select id="voiceSelect"></select>
  </div>
</div>

<div class="small" id="modeHint"></div>

<div class="progressContainer">
  <div id="progressBar" class="progressBar"></div>
</div>

<div id="message" class="message"></div>
<div id="counter"></div>

<div id="mainText" class="mainText">Cargando...</div>
<div id="answer" class="answer"></div>

<div>
  <button class="show" onclick="showAnswer()">Ver respuesta</button>
  <button class="listen" onclick="speakCurrent()">🔊 Escuchar</button>
  <button class="speak" id="speakBtn" onclick="startRecognition()">🎤 Hablar</button>
  <button class="ok" onclick="markCorrect()">Correcto</button>
  <button class="bad" onclick="markWrong()">Incorrecto</button>
</div>

<div class="feedbackBox">
  <div id="speechScore" class="score"></div>
</div>

<div class="stats">
  Correctas: <span id="okCount">0</span> |
  Incorrectas: <span id="badCount">0</span> |
  Errores bloque: <span id="errorCount">0</span> |
  Errores acumulados: <span id="globalErrorCount">0</span>
</div>

</div>

<script>
const SHEET_ID = "1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY";

const STORAGE_KEYS = {
  frases: "errores_acumulados_frases",
  textos: "errores_acumulados_textos",
  voice: "selected_voice_index",
  speed: "selected_speed"
};

const SHEET_NAMES = {
  frases: "FRASES",
  textos: "TEXTOS"
};

let frasesData = [];
let textosData = [];

let currentSource = "frases";
let trainingMode = "es_en";

let bloqueActual = [];
let erroresBloque = [];
let erroresGlobal = [];
let cola = [];
let indice = 0;
let modoRepaso = false;
let modoGlobal = false;
let actual = null;
let ok = 0;
let bad = 0;
let ultima = null;

let englishVoices = [];
let recognition = null;
let recognizing = false;

const sourceSelectEl = document.getElementById("sourceSelect");
const blockSelectEl = document.getElementById("blockSelect");
const modeSelectEl = document.getElementById("modeSelect");
const speedSelectEl = document.getElementById("speedSelect");
const voiceSelectEl = document.getElementById("voiceSelect");
const modeHintEl = document.getElementById("modeHint");
const progressBarEl = document.getElementById("progressBar");
const messageEl = document.getElementById("message");
const counterEl = document.getElementById("counter");
const mainTextEl = document.getElementById("mainText");
const answerEl = document.getElementById("answer");
const speechScoreEl = document.getElementById("speechScore");
const speakBtnEl = document.getElementById("speakBtn");

function getStorageKey(){
  return STORAGE_KEYS[currentSource];
}

function getCurrentDataset(){
  return currentSource === "frases" ? frasesData : textosData;
}

function getCurrentBlockField(){
  return currentSource === "frases" ? "bloque" : "capitulo";
}

function loadGlobal(){
  const d = localStorage.getItem(getStorageKey());
  erroresGlobal = d ? JSON.parse(d) : [];
}

function saveGlobal(){
  localStorage.setItem(getStorageKey(), JSON.stringify(erroresGlobal));
}

function loadVoicePrefs(){
  const savedSpeed = localStorage.getItem(STORAGE_KEYS.speed);
  if(savedSpeed) speedSelectEl.value = savedSpeed;
}

function saveVoicePrefs(){
  localStorage.setItem(STORAGE_KEYS.speed, speedSelectEl.value);
  localStorage.setItem(STORAGE_KEYS.voice, voiceSelectEl.value);
}

function getSelectedSpeed(){
  return parseFloat(speedSelectEl.value || "1");
}

function shuffle(a){
  const arr = [...a];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadVoices(){
  const voices = speechSynthesis.getVoices();

  englishVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));

  voiceSelectEl.innerHTML = "";

  if(englishVoices.length === 0){
    const o = document.createElement("option");
    o.value = "";
    o.textContent = "Voz inglesa no disponible";
    voiceSelectEl.appendChild(o);
    return;
  }

  englishVoices.forEach((v, i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = `${v.name} (${v.lang})`;
    voiceSelectEl.appendChild(o);
  });

  const savedVoice = localStorage.getItem(STORAGE_KEYS.voice);
  if(savedVoice !== null && englishVoices[savedVoice]){
    voiceSelectEl.value = savedVoice;
  } else {
    let preferredIndex =
      englishVoices.findIndex(v => v.lang === "en-GB") >= 0 ? englishVoices.findIndex(v => v.lang === "en-GB") :
      englishVoices.findIndex(v => v.lang === "en-US") >= 0 ? englishVoices.findIndex(v => v.lang === "en-US") :
      0;
    voiceSelectEl.value = preferredIndex;
  }
}

function getSelectedVoice(){
  const i = parseInt(voiceSelectEl.value, 10);
  if(Number.isNaN(i)) return null;
  return englishVoices[i] || null;
}

function stopSpeaking(){
  if("speechSynthesis" in window){
    window.speechSynthesis.cancel();
  }
}

function speakText(text, lang = "en-US"){
  if(!text) return;

  stopSpeaking();

  const utter = new SpeechSynthesisUtterance(text);
  const selectedVoice = getSelectedVoice();

  utter.lang = selectedVoice ? selectedVoice.lang : lang;
  utter.rate = getSelectedSpeed();
  utter.pitch = 1;
  utter.volume = 1;

  if(selectedVoice){
    utter.voice = selectedVoice;
  }

  window.speechSynthesis.speak(utter);
}

function speakCurrent(){
  if(!actual) return;

  const text = currentSource === "frases" ? actual.en : actual.ingles;
  speakText(text, "en-US");
}

function parseCSVLine(line){
  const result = [];
  let current = "";
  let inQuotes = false;

  for(let i = 0; i < line.length; i++){
    const char = line[i];
    const next = line[i + 1];

    if(char === '"'){
      if(inQuotes && next === '"'){
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(char === "," && !inQuotes){
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result.map(v => v.trim());
}

function normalizeText(text){
  return (text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[.,!?;:()"']/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function levenshtein(a, b){
  const matrix = [];

  for(let i = 0; i <= b.length; i++) matrix[i] = [i];
  for(let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for(let i = 1; i <= b.length; i++){
    for(let j = 1; j <= a.length; j++){
      if(b.charAt(i - 1) === a.charAt(j - 1)){
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }

  return matrix[b.length][a.length];
}

function similarityScore(a, b){
  const aa = normalizeText(a);
  const bb = normalizeText(b);

  if(!aa && !bb) return 100;
  if(!aa || !bb) return 0;
  if(aa === bb) return 100;

  const dist = levenshtein(aa, bb);
  const maxLen = Math.max(aa.length, bb.length);
  return Math.round((1 - dist / maxLen) * 100);
}

function evaluateSpeech(recognized, expected){
  const score = similarityScore(recognized, expected);

  if(score >= 85){
    return { label: "✅ Muy bien", score };
  }else if(score >= 60){
    return { label: "🟡 Casi", score };
  }else{
    return { label: "🔴 Inténtalo otra vez", score };
  }
}

function initRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    recognizing = true;
    speechScoreEl.innerText = "Escuchando...";
  };

  recognition.onresult = (event) => {
    const recognized = event.results[0][0].transcript;

    let expected = "";
    if(currentSource === "frases"){
      expected = actual?.en || "";
    } else {
      expected = actual?.ingles || "";
    }

    if(expected){
      const result = evaluateSpeech(recognized, expected);
      speechScoreEl.innerText = `${recognized}\n${result.label} (${result.score}%)`;
    }
  };

  recognition.onerror = (event) => {
    let msg = "Error al reconocer la voz";
    if(event.error === "not-allowed") msg = "No has dado permiso al micrófono";
    if(event.error === "no-speech") msg = "No se ha detectado voz";
    if(event.error === "audio-capture") msg = "No se ha detectado micrófono";
    speechScoreEl.innerText = msg;
  };

  recognition.onend = () => {
    recognizing = false;
  };
}

function startRecognition(){
  if(!actual) return;

  if(currentSource !== "frases" || trainingMode !== "es_en"){
    speechScoreEl.innerText = "🎤 El modo hablar solo se usa en FRASES y en Español → Inglés.";
    return;
  }

  if(!recognition){
    speechScoreEl.innerText = "Este navegador no soporta reconocimiento de voz";
    return;
  }

  if(recognizing){
    recognition.stop();
    return;
  }

  stopSpeaking();
  recognition.start();
}

function clearFeedback(){
  answerEl.innerText = "";
  speechScoreEl.innerText = "";
  messageEl.innerText = "";
}

function updateModeUI(){
  if(currentSource === "frases"){
    modeSelectEl.innerHTML = `
      <option value="es_en">Español → Inglés</option>
      <option value="en_es">Listening Inglés → Español</option>
    `;
    if(!["es_en","en_es"].includes(trainingMode)) trainingMode = "es_en";
    modeSelectEl.value = trainingMode;
    modeHintEl.innerText = "FRASES: puedes traducir, escuchar y usar speaking.";
    speakBtnEl.style.display = "inline-block";
  } else {
    modeSelectEl.innerHTML = `
      <option value="en_es">Listening Inglés → Español</option>
    `;
    trainingMode = "en_es";
    modeSelectEl.value = trainingMode;
    modeHintEl.innerText = "TEXTOS: escucha una celda en inglés, piensa el español y verifica.";
    speakBtnEl.style.display = "none";
  }
}

function populateBlocks(){
  const data = getCurrentDataset();
  const field = getCurrentBlockField();

  const blocks = [...new Set(data.map(item => item[field]))];
  blockSelectEl.innerHTML = "";

  blocks.forEach(b => {
    const o = document.createElement("option");
    o.value = b;
    o.textContent = b;
    blockSelectEl.appendChild(o);
  });

  const o = document.createElement("option");
  o.value = "repaso_global";
  o.textContent = "repaso acumulado";
  blockSelectEl.appendChild(o);
}

function getPromptText(item){
  if(currentSource === "frases"){
    return trainingMode === "es_en" ? item.es : "🔊 Escucha la frase...";
  } else {
    return "🔊 Escucha el texto...";
  }
}

function getAnswerText(item){
  if(currentSource === "frases"){
    if(trainingMode === "es_en"){
      return item.en;
    }
    return `EN: ${item.en}\nES: ${item.es}`;
  } else {
    return `EN: ${item.ingles}\n\nES: ${item.español}`;
  }
}

function sameItem(a, b){
  if(currentSource === "frases"){
    return a.es === b.es && a.en === b.en;
  } else {
    return a.id === b.id && a.capitulo === b.capitulo;
  }
}

function updateBar(){
  const total = bloqueActual.length;
  if(total === 0) return;

  const done = modoRepaso ? total - erroresBloque.length : indice;
  const pct = (done / total) * 100;

  progressBarEl.style.width = pct + "%";
  counterEl.innerText = `Elemento ${Math.min(done, total)} / ${total}`;
}

function updateStats(){
  document.getElementById("okCount").innerText = ok;
  document.getElementById("badCount").innerText = bad;
  document.getElementById("errorCount").innerText = erroresBloque.length;
  document.getElementById("globalErrorCount").innerText = erroresGlobal.length;
}

function next(){
  stopSpeaking();
  clearFeedback();

  if(!modoRepaso){
    if(indice >= cola.length){
      modoRepaso = true;

      if(erroresBloque.length === 0 && !modoGlobal){
        mainTextEl.innerText = "Bloque completado 🎉";
        updateBar();
        updateStats();
        return;
      }

      messageEl.innerText = "🔁 Repaso de errores";
    } else {
      actual = cola[indice];
      indice++;
    }
  }

  if(modoRepaso){
    const lista = modoGlobal ? erroresGlobal : erroresBloque;

    if(lista.length === 0){
      mainTextEl.innerText = "Repaso completado 🎉";
      updateBar();
      updateStats();
      return;
    }

    let i;
    do{
      i = Math.floor(Math.random() * lista.length);
      actual = lista[i];
    }while(actual === ultima && lista.length > 1);
  }

  ultima = actual;
  mainTextEl.innerText = getPromptText(actual);

  updateBar();
  updateStats();

  if(trainingMode === "en_es"){
    setTimeout(() => speakCurrent(), 350);
  }
}

function showAnswer(){
  if(!actual) return;
  answerEl.innerText = getAnswerText(actual);
}

function markCorrect(){
  ok++;

  erroresBloque = erroresBloque.filter(e => !sameItem(e, actual));

  if(modoGlobal){
    erroresGlobal = erroresGlobal.filter(e => !sameItem(e, actual));
    saveGlobal();
  }

  next();
}

function markWrong(){
  bad++;

  if(!erroresBloque.find(e => sameItem(e, actual))) erroresBloque.push(actual);

  if(!erroresGlobal.find(e => sameItem(e, actual))){
    erroresGlobal.push(actual);
    saveGlobal();
  }

  next();
}

function startBlock(){
  stopSpeaking();
  clearFeedback();
  loadGlobal();

  const data = getCurrentDataset();
  const field = getCurrentBlockField();

  const block = blockSelectEl.value;
  modoGlobal = block === "repaso_global";
  erroresBloque = [];

  if(modoGlobal){
    bloqueActual = [...erroresGlobal];
    modoRepaso = true;
  } else {
    bloqueActual = data.filter(item => item[field] === block);
    bloqueActual = shuffle(bloqueActual);
    modoRepaso = false;
  }

  cola = [...bloqueActual];
  indice = 0;

  next();
}

function onSourceChange(){
  currentSource = sourceSelectEl.value;
  updateModeUI();
  populateBlocks();
  startBlock();
}

function onModeChange(){
  trainingMode = modeSelectEl.value;
  startBlock();
}

async function loadSheetData(sheetName){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const r = await fetch(url);
  const t = await r.text();

  const rows = t.split(/\r?\n/);
  rows.shift();

  return rows
    .filter(r => r.trim())
    .map(parseCSVLine);
}

async function cargar(){
  try{
    loadVoicePrefs();

    const frasesRows = await loadSheetData(SHEET_NAMES.frases);
    frasesData = [];

    frasesRows.forEach(cols => {
      const bloque = cols[1]?.trim();
      const es = cols[2]?.trim();
      const en = cols[3]?.trim();
      const activa = cols[4]?.trim();

      if(bloque && es && en && activa && activa.toLowerCase().includes("x")){
        frasesData.push({ bloque, es, en });
      }
    });

    const textosRows = await loadSheetData(SHEET_NAMES.textos);
    textosData = [];

    textosRows.forEach(cols => {
      const capitulo = cols[0]?.trim();
      const id = cols[1]?.trim();
      const ingles = cols[2]?.trim();
      const español = cols[3]?.trim();
      const activa = cols[4]?.trim();

      if(capitulo && id && ingles && español && activa && activa.toLowerCase().includes("x")){
        textosData.push({ capitulo, id, ingles, español });
      }
    });

    if(frasesData.length === 0 && textosData.length === 0){
      mainTextEl.innerText = "No se han encontrado datos activos";
      return;
    }

    updateModeUI();
    populateBlocks();
    startBlock();
  } catch(error){
    console.error(error);
    mainTextEl.innerText = "Error al cargar los datos";
  }
}

sourceSelectEl.onchange = onSourceChange;
modeSelectEl.onchange = onModeChange;
blockSelectEl.onchange = startBlock;
speedSelectEl.onchange = saveVoicePrefs;
voiceSelectEl.onchange = saveVoicePrefs;

if("speechSynthesis" in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

initRecognition();
cargar();
</script>

</body>
</html>
