
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenamiento de frases</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:900px;
margin:auto
}

h1{margin-top:0}

.topbar{
margin-bottom:10px;
}

select{
padding:8px;
border-radius:6px;
border:none
}

.es{
font-size:18px;
font-weight:bold;
line-height:1.45;
margin-top:10px
}

.answer{
margin-top:10px;
font-size:18px;
color:#cbd5f5
}

button{
padding:10px 14px;
margin:6px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer
}

.show{background:#e5e7eb;color:black}
.ok{background:#22c55e}
.bad{background:#ef4444;color:white}
.next{background:#38bdf8}

.stats{
margin-top:15px;
font-size:14px;
color:#94a3b8
}

.progressContainer{
margin-top:12px;
background:#0b1220;
border-radius:8px;
overflow:hidden;
height:12px
}

.progressBar{
height:12px;
width:0%;
background:#38bdf8;
transition:width .3s
}

.message{
margin-top:10px;
font-size:14px;
color:#facc15
}

</style>
</head>

<body>

<div class="card">

<h1>Entrenamiento de frases</h1>

<div class="topbar">
<label>Bloque:</label>
<select id="blockSelect"></select>
</div>

<div class="progressContainer">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="message" class="message"></div>

<div id="es" class="es">Cargando...</div>
<div id="answer" class="answer"></div>

<div>
<button class="show" onclick="showAnswer()">Ver respuesta</button>
<button class="ok" onclick="markCorrect()">Correcto</button>
<button class="bad" onclick="markWrong()">Incorrecto</button>
<button class="next" onclick="next()">Siguiente</button>
</div>

<div class="stats">
Correctas: <span id="okCount">0</span> |
Incorrectas: <span id="badCount">0</span> |
Errores pendientes: <span id="errorCount">0</span>
</div>

</div>

<script>

const SHEET_ID="1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY"

let frases=[]
let bloqueActual=[]
let errores=[]
let indice=0
let modoRepaso=false
let actual=null
let ok=0
let bad=0
let ultima=null

async function cargar(){

let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`
let r=await fetch(url)
let t=await r.text()

let rows=t.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

let bloque=c[1]
let es=c[2]
let en=c[3]
let activa=c[4]

if(activa && activa.toLowerCase().includes("x")){

frases.push({
bloque:bloque.trim(),
es:es.trim(),
en:en.trim()
})

}

})

initBlocks()

}

function initBlocks(){

let blocks=[...new Set(frases.map(f=>f.bloque))]

let select=document.getElementById("blockSelect")

blocks.forEach(b=>{

let opt=document.createElement("option")
opt.value=b
opt.textContent=b
select.appendChild(opt)

})

select.addEventListener("change",startBlock)

startBlock()

}

function startBlock(){

let block=document.getElementById("blockSelect").value

bloqueActual=frases.filter(f=>f.bloque===block)

indice=0
errores=[]
modoRepaso=false

document.getElementById("message").innerText=""

next()

}

function actualizarBarra(){

let total=bloqueActual.length
let hecho=indice

if(modoRepaso){
hecho=total-errores.length
}

let pct=(hecho/total)*100

document.getElementById("progressBar").style.width=pct+"%"

}

function next(){

document.getElementById("answer").innerText=""

if(!modoRepaso){

if(indice>=bloqueActual.length){

modoRepaso=true

document.getElementById("message").innerText="Entrando en repaso de errores"

if(errores.length===0){

document.getElementById("es").innerText="Bloque completado 🎉"
return

}

}else{

actual=bloqueActual[indice]
indice++

}

}

if(modoRepaso){

if(errores.length===0){

document.getElementById("message").innerText="Repaso completado 🎉"
document.getElementById("es").innerText="Bloque completado"
return

}

do{
let i=Math.floor(Math.random()*errores.length)
actual=errores[i]
}while(actual===ultima && errores.length>1)

}

ultima=actual

document.getElementById("es").innerText=actual.es

actualizarBarra()
updateStats()

}

function showAnswer(){

document.getElementById("answer").innerText=actual.en

}

function markCorrect(){

ok++

errores=errores.filter(e=>e!==actual)

next()

}

function markWrong(){

bad++

if(!errores.includes(actual)){
errores.push(actual)
}

next()

}

function updateStats(){

document.getElementById("okCount").innerText=ok
document.getElementById("badCount").innerText=bad
document.getElementById("errorCount").innerText=errores.length

}

cargar()

</script>

</body>
</html>
