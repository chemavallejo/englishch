<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenamiento de frases</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:900px;margin:auto}
h1{margin-top:0}
select{padding:8px;border-radius:6px;border:none;margin-right:8px;margin-top:6px}
.es{font-size:18px;font-weight:bold;line-height:1.45;margin-top:10px}
.answer{margin-top:10px;font-size:18px;color:#cbd5f5}
button{padding:10px 14px;margin:6px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.show{background:#e5e7eb;color:black}
.ok{background:#22c55e}
.bad{background:#ef4444;color:white}
.listen{background:#3b82f6;color:white}
.speak{background:#a855f7;color:white}
.stats{margin-top:15px;font-size:14px;color:#94a3b8}
.progressContainer{margin-top:12px;background:#0b1220;border-radius:8px;overflow:hidden;height:12px}
.progressBar{height:12px;width:0%;background:#38bdf8;transition:width .3s}
.message{margin-top:10px;font-size:14px;color:#facc15}
.speechBox{margin-top:14px;padding:12px;border-radius:10px;background:#0b1220}
.score{margin-top:8px;font-size:16px;font-weight:bold}
</style>
</head>

<body>

<div class="card">

<h1>Entrenamiento de frases</h1>

<label>Bloque:</label>
<select id="blockSelect"></select>

<label>Modo:</label>
<select id="modeSelect">
<option value="es_en">Español → Inglés</option>
<option value="en_es">🎧 Listening Inglés → Español</option>
</select>

<div class="progressContainer">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="counter"></div>

<div id="es" class="es">Cargando...</div>
<div id="answer" class="answer"></div>

<div>
<button class="show" onclick="showAnswer()">Ver respuesta</button>
<button class="listen" onclick="speakEnglish()">🔊 Escuchar</button>
<button class="speak" onclick="startRecognition()">🎤 Hablar</button>
<button class="ok" onclick="markCorrect()">Correcto</button>
<button class="bad" onclick="markWrong()">Incorrecto</button>
</div>

<div class="speechBox">
<div id="speechScore" class="score"></div>
</div>

<div class="stats">
Correctas: <span id="okCount">0</span> |
Incorrectas: <span id="badCount">0</span> |
Errores bloque: <span id="errorCount">0</span> |
Errores acumulados: <span id="globalErrorCount">0</span>
</div>

</div>

<script>
const SHEET_ID="1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY"
const STORAGE_KEY="errores_acumulados_frases"

let frases=[]
let bloqueActual=[]
let erroresBloque=[]
let erroresGlobal=[]
let cola=[]
let indice=0
let modoRepaso=false
let modoGlobal=false
let actual=null
let ok=0
let bad=0
let ultima=null
let selectedVoice=null
let recognition=null
let trainingMode="es_en"

function speakEnglish(){
if(!actual) return
const u=new SpeechSynthesisUtterance(actual.en)
u.lang="en-US"
speechSynthesis.cancel()
speechSynthesis.speak(u)
}

function autoSpeak(){
if(trainingMode==="en_es"){
setTimeout(()=>speakEnglish(),300)
}
}

function showAnswer(){
if(trainingMode==="es_en"){
answer.innerText=actual.en
}else{
answer.innerText="EN: "+actual.en+"  |  ES: "+actual.es
}
}

function next(){

answer.innerText=""

if(!modoRepaso){

if(indice>=cola.length){

modoRepaso=true

if(erroresBloque.length===0){
es.innerText="Bloque completado 🎉"
return
}

}else{
actual=cola[indice]
indice++
}

}

if(modoRepaso){

let lista=modoGlobal?erroresGlobal:erroresBloque

if(lista.length===0){
es.innerText="Repaso completado 🎉"
return
}

let i=Math.floor(Math.random()*lista.length)
actual=lista[i]
}

ultima=actual

if(trainingMode==="es_en"){
es.innerText=actual.es
}else{
es.innerText="🔊 Escucha la frase..."
}

updateBar()
updateStats()
autoSpeak()
}

function updateBar(){
let total=bloqueActual.length
let done=indice
let pct=(done/total)*100
progressBar.style.width=pct+"%"
counter.innerText="Frase "+done+" / "+total
}

function markCorrect(){
ok++
erroresBloque=erroresBloque.filter(e=>e.en!==actual.en)
if(modoGlobal){
erroresGlobal=erroresGlobal.filter(e=>e.en!==actual.en)
localStorage.setItem(STORAGE_KEY,JSON.stringify(erroresGlobal))
}
next()
}

function markWrong(){
bad++
if(!erroresBloque.find(e=>e.en===actual.en)) erroresBloque.push(actual)
if(!erroresGlobal.find(e=>e.en===actual.en)){
erroresGlobal.push(actual)
localStorage.setItem(STORAGE_KEY,JSON.stringify(erroresGlobal))
}
next()
}

function updateStats(){
okCount.innerText=ok
badCount.innerText=bad
errorCount.innerText=erroresBloque.length
globalErrorCount.innerText=erroresGlobal.length
}

function startBlock(){

trainingMode=modeSelect.value

let block=blockSelect.value
modoGlobal=block==="repaso_global"

erroresBloque=[]

if(modoGlobal){
bloqueActual=[...erroresGlobal]
modoRepaso=true
}else{
bloqueActual=frases.filter(f=>f.bloque===block)
modoRepaso=false
}

cola=[...bloqueActual]
indice=0
next()
}

async function cargar(){

let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`
let r=await fetch(url)
let t=await r.text()

let rows=t.split(/\r?\n/).slice(1)

rows.forEach(r=>{
let m=r.split(",")
if(m[4]&&m[4].toLowerCase().includes("x")){
frases.push({bloque:m[1],es:m[2],en:m[3]})
}
})

let blocks=[...new Set(frases.map(f=>f.bloque))]

blocks.forEach(b=>{
let o=document.createElement("option")
o.value=b
o.textContent=b
blockSelect.appendChild(o)
})

let o=document.createElement("option")
o.value="repaso_global"
o.textContent="repaso acumulado"
blockSelect.appendChild(o)

blockSelect.onchange=startBlock
modeSelect.onchange=startBlock

startBlock()
}

cargar()
</script>

</body>
</html>
