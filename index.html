<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenador de frases</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #111827;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      margin-bottom: 12px;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 70px 1fr 70px 1fr 70px 1fr;
      gap: 8px;
      align-items: center;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .ok {
      background: #10b981;
      color: white;
    }

    .wrong {
      background: #ef4444;
      color: white;
    }

    .soft {
      background: #e8eefc;
      color: #111827;
    }

    .big {
      font-size: 24px;
      line-height: 1.3;
      min-height: 54px;
    }

    .answer {
      font-size: 20px;
      line-height: 1.3;
      min-height: 46px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pill {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .status {
      margin-top: 8px;
      font-size: 14px;
      color: #374151;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 10px;
      }

      .row,
      .stats {
        grid-template-columns: 1fr;
      }

      .big {
        font-size: 21px;
      }

      .answer {
        font-size: 18px;
      }

      button {
        width: 100%;
      }

      .card {
        padding: 12px;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Entrenador de frases</h1>

    <div class="card">
      <div class="muted">Google Sheets conectado</div>
      <div class="status" id="status">Cargando frases desde Google Sheets...</div>
      <div class="btns">
        <button class="primary" id="reloadBtn">Actualizar frases</button>
        <button class="soft" id="resetProgressBtn">Reiniciar progreso</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div class="muted">Bloque</div>
        <input id="blockSize" type="number" min="1" value="10" />
        <div class="muted">%</div>
        <input id="threshold" type="number" min="1" max="100" value="90" />
        <div class="muted">Inicio</div>
        <input id="startId" type="number" min="1" value="1" />
      </div>

      <div class="btns">
        <button class="soft" id="startBtn">Empezar</button>
        <button class="soft" id="nextBtn">Siguiente</button>
        <button class="soft" id="nextBlockBtn">Siguiente bloque</button>
      </div>

      <div class="status" id="blockInfo">Bloque: —</div>
    </div>

    <div class="card">
      <div class="muted">Frase en español</div>
      <div class="big" id="spanish">—</div>
    </div>

    <div class="card">
      <div class="muted">Respuesta en inglés</div>
      <div class="answer" id="english">Pulsa “Ver respuesta” cuando ya la hayas pensado.</div>
      <div class="btns">
        <button class="primary" id="revealBtn">Ver respuesta</button>
        <button class="ok" id="okBtn" disabled>OK</button>
        <button class="wrong" id="wrongBtn" disabled>WRONG</button>
      </div>
    </div>

    <div class="card">
      <div class="stats">
        <div class="pill">
          <div class="muted">Aciertos</div>
          <div id="correct">0</div>
        </div>
        <div class="pill">
          <div class="muted">Errores</div>
          <div id="wrong">0</div>
        </div>
        <div class="pill">
          <div class="muted">Precisión</div>
          <div id="accuracy">0%</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY/export?format=csv&gid=0";
    const STORAGE_KEY = "trainer_frases_v2";

    let allData = [];
    let blockStart = 1;
    let blockSize = 10;
    let threshold = 90;

    let asked = new Set();
    let wrongQueue = [];
    let current = null;
    let revealed = false;
    let correctCount = 0;
    let wrongCount = 0;
    let failMap = {};

    const el = id => document.getElementById(id);

    function normalize(s) {
      return String(s || "")
        .replace(/^\uFEFF/, "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function detectDelimiter(text) {
      const first = text.split(/\r?\n/).find(l => l.trim() !== "") || "";
      if (first.includes(";")) return ";";
      if (first.includes("\t")) return "\t";
      return ",";
    }

    function parseDelimitedLine(line, delimiter) {
      const result = [];
      let field = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          result.push(field);
          field = "";
        } else {
          field += char;
        }
      }

      result.push(field);
      return result;
    }

    function parseCSV(text) {
      const delimiter = detectDelimiter(text);

      const rows = text
        .split(/\r?\n/)
        .filter(l => l.trim() !== "")
        .map(line => parseDelimitedLine(line, delimiter));

      if (!rows.length) {
        throw new Error("El CSV está vacío.");
      }

      const header = rows[0].map(normalize);

      const idIndex = header.findIndex(h => h === "ID");
      const esIndex = header.findIndex(h => h === "ESPANOL");
      const enIndex = header.findIndex(h => h === "TRADUCCION CORRECTA");
      const actIndex = header.findIndex(h => h === "ACTIVA");

      if (idIndex === -1 || esIndex === -1 || enIndex === -1) {
        throw new Error("La hoja debe incluir las columnas ID, ESPAÑOL y TRADUCCIÓN CORRECTA.");
      }

      return rows
        .slice(1)
        .map(r => ({
          id: Number(r[idIndex]),
          es: (r[esIndex] || "").trim(),
          en: (r[enIndex] || "").trim(),
          act: actIndex >= 0 ? String(r[actIndex] || "").trim() : "1"
        }))
        .filter(x =>
          Number.isFinite(x.id) &&
          x.es &&
          x.en &&
          (x.act === "1" || x.act === "")
        )
        .sort((a, b) => a.id - b.id);
    }

    function saveProgress() {
      const data = {
        blockStart,
        blockSize,
        threshold,
        asked: Array.from(asked),
        wrongQueue,
        currentId: current ? current.id : null,
        revealed,
        correctCount,
        wrongCount,
        failMap
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadProgress() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const data = JSON.parse(raw);

        blockStart = Number(data.blockStart || 1);
        blockSize = Number(data.blockSize || 10);
        threshold = Number(data.threshold || 90);
        asked = new Set(Array.isArray(data.asked) ? data.asked : []);
        wrongQueue = Array.isArray(data.wrongQueue) ? data.wrongQueue : [];
        revealed = Boolean(data.revealed);
        correctCount = Number(data.correctCount || 0);
        wrongCount = Number(data.wrongCount || 0);
        failMap = data.failMap || {};

        el("blockSize").value = blockSize;
        el("threshold").value = threshold;
        el("startId").value = blockStart;

        if (data.currentId && allData.length) {
          current = allData.find(x => x.id === data.currentId) || null;
        }
      } catch (e) {
        console.error("No se pudo cargar progreso:", e);
      }
    }

    function clearProgress() {
      localStorage.removeItem(STORAGE_KEY);
    }

    async function loadRemoteCSV() {
      try {
        el("status").textContent = "Cargando frases...";

        const response = await fetch(SHEET_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("No se pudo descargar el CSV de Google Sheets.");
        }

        const text = await response.text();
        allData = parseCSV(text);

        if (!allData.length) {
          throw new Error("No hay frases activas válidas.");
        }

        loadProgress();
        renderCurrentState();

        el("status").textContent = "Frases cargadas: " + allData.length;
      } catch (err) {
        el("status").textContent = "Error: " + err.message;
        alert("Error al cargar Google Sheets: " + err.message);
      }
    }

    function currentBlockData() {
      const end = blockStart + blockSize - 1;
      return allData.filter(x => x.id >= blockStart && x.id <= end);
    }

    function updateStats() {
      const total = correctCount + wrongCount;
      const acc = total ? Math.round(correctCount / total * 100) : 0;

      el("correct").textContent = correctCount;
      el("wrong").textContent = wrongCount;
      el("accuracy").textContent = acc + "%";
      el("blockInfo").textContent =
        "Bloque: " + blockStart + "–" + (blockStart + blockSize - 1) + " · Respondidas: " + total;
    }

    function canAdvance() {
      const total = correctCount + wrongCount;
      const block = currentBlockData();
      const minimum = Math.min(blockSize, block.length);
      const acc = total ? Math.round(correctCount / total * 100) : 0;

      return total >= minimum && acc >= threshold;
    }

    function resetBlockStats() {
      asked = new Set();
      wrongQueue = [];
      current = null;
      revealed = false;
      correctCount = 0;
      wrongCount = 0;
      failMap = {};

      el("correct").textContent = "0";
      el("wrong").textContent = "0";
      el("accuracy").textContent = "0%";
      el("english").textContent = "Pulsa “Ver respuesta” cuando ya la hayas pensado.";
      el("okBtn").disabled = true;
      el("wrongBtn").disabled = true;
      el("revealBtn").disabled = false;

      updateStats();
      saveProgress();
    }

    function enqueueError(id) {
      const fails = failMap[id] || 0;
      const repeats = Math.min(6, 2 + fails); // cada fallo hace que reaparezca más veces

      for (let i = 0; i < repeats; i++) {
        wrongQueue.push(id);
      }
    }

    function getPriorityCandidate(block) {
      while (wrongQueue.length > 0) {
        const id = wrongQueue.shift();
        const candidate = block.find(x => x.id === id && !asked.has(x.id));
        if (candidate) return candidate;
      }
      return null;
    }

    function renderCurrentState() {
      updateStats();

      if (!current) {
        el("spanish").textContent = "—";
        el("english").textContent = "Pulsa “Ver respuesta” cuando ya la hayas pensado.";
        el("okBtn").disabled = true;
        el("wrongBtn").disabled = true;
        el("revealBtn").disabled = false;
        return;
      }

      el("spanish").textContent = current.es;
      el("english").textContent = revealed ? current.en : "Pulsa “Ver respuesta” cuando ya la hayas pensado.";
      el("okBtn").disabled = !revealed;
      el("wrongBtn").disabled = !revealed;
      el("revealBtn").disabled = false;
    }

    function nextQuestion() {
      const block = currentBlockData();

      if (!block.length) {
        current = null;
        el("spanish").textContent = "No hay frases activas en este bloque.";
        el("english").textContent = "Revisa el ID inicial o el tamaño del bloque.";
        el("revealBtn").disabled = true;
        el("okBtn").disabled = true;
        el("wrongBtn").disabled = true;
        updateStats();
        saveProgress();
        return;
      }

      let candidate = getPriorityCandidate(block);

      if (!candidate) {
        const pool = block.filter(x => !asked.has(x.id));

        if (!pool.length) {
          if (!canAdvance()) {
            asked = new Set();
            wrongQueue = [];

            Object.keys(failMap)
              .sort((a, b) => (failMap[b] || 0) - (failMap[a] || 0))
              .forEach(id => enqueueError(Number(id)));

            current = null;
            el("spanish").textContent = "Repetimos el bloque porque aún no has llegado al porcentaje objetivo.";
            el("english").textContent = "Las frases falladas saldrán antes y más veces. Pulsa Siguiente.";
            el("revealBtn").disabled = true;
            el("okBtn").disabled = true;
            el("wrongBtn").disabled = true;
            updateStats();
            saveProgress();
            return;
          }

          current = null;
          el("spanish").textContent = "Bloque superado. Ya puedes pasar al siguiente bloque.";
          el("english").textContent = "—";
          el("revealBtn").disabled = true;
          el("okBtn").disabled = true;
          el("wrongBtn").disabled = true;
          updateStats();
          saveProgress();
          return;
        }

        candidate = pool[Math.floor(Math.random() * pool.length)];
      }

      current = candidate;
      asked.add(current.id);
      revealed = false;

      el("spanish").textContent = current.es;
      el("english").textContent = "Pulsa “Ver respuesta” cuando ya la hayas pensado.";
      el("revealBtn").disabled = false;
      el("okBtn").disabled = true;
      el("wrongBtn").disabled = true;

      updateStats();
      saveProgress();
    }

    el("reloadBtn").addEventListener("click", async () => {
      await loadRemoteCSV();
    });

    el("resetProgressBtn").addEventListener("click", () => {
      clearProgress();
      resetBlockStats();
      current = null;
      el("spanish").textContent = "—";
      el("english").textContent = "Pulsa “Ver respuesta” cuando ya la hayas pensado.";
      el("startId").value = 1;
      blockStart = 1;
      updateStats();
    });

    el("startBtn").addEventListener("click", () => {
      if (!allData.length) {
        alert("Primero espera a que se carguen las frases o pulsa Actualizar frases.");
        return;
      }

      blockSize = Math.max(1, Number(el("blockSize").value || 10));
      threshold = Math.min(100, Math.max(1, Number(el("threshold").value || 90)));
      blockStart = Math.max(1, Number(el("startId").value || 1));

      resetBlockStats();
      nextQuestion();
    });

    el("revealBtn").addEventListener("click", () => {
      if (!current) return;

      revealed = true;
      el("english").textContent = current.en;
      el("okBtn").disabled = false;
      el("wrongBtn").disabled = false;
      saveProgress();
    });

    el("okBtn").addEventListener("click", () => {
      if (!revealed || !current) return;

      correctCount++;
      delete failMap[current.id];
      wrongQueue = wrongQueue.filter(id => id !== current.id);

      nextQuestion();
    });

    el("wrongBtn").addEventListener("click", () => {
      if (!revealed || !current) return;

      wrongCount++;
      failMap[current.id] = (failMap[current.id] || 0) + 1;
      enqueueError(current.id);

      nextQuestion();
    });

    el("nextBtn").addEventListener("click", () => {
      nextQuestion();
    });

    el("nextBlockBtn").addEventListener("click", () => {
      if (!canAdvance()) {
        alert("Aún no alcanzas el objetivo del bloque.");
        return;
      }

      blockStart += blockSize;
      el("startId").value = blockStart;

      resetBlockStats();
      nextQuestion();
    });

    loadRemoteCSV();
  </script>
</body>
</html>
