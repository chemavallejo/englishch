
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenamiento de frases</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:900px;margin:auto}
h1{margin-top:0}
.es{font-size:18px;font-weight:bold;line-height:1.45;margin-top:10px}
.answer{margin-top:10px;font-size:18px;color:#cbd5f5}
button{padding:10px 14px;margin:6px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.show{background:#e5e7eb;color:black}
.ok{background:#22c55e}
.bad{background:#ef4444;color:white}
.next{background:#38bdf8}
.stats{margin-top:15px;font-size:14px;color:#94a3b8}
.topbar{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
select{padding:8px;border-radius:6px;border:none}
</style>
</head>

<body>

<div class="card">

<h1>Entrenamiento de frases</h1>

<div class="topbar">
<label>Bloque:</label>
<select id="blockSelect"></select>
</div>

<div id="es" class="es">Cargando frases...</div>
<div id="answer" class="answer"></div>

<div>
<button class="show" onclick="showAnswer()">Ver respuesta</button>
<button class="ok" onclick="markCorrect()">Correcto</button>
<button class="bad" onclick="markWrong()">Incorrecto</button>
<button class="next" onclick="next()">Siguiente</button>
</div>

<div class="stats">
Correctas: <span id="okCount">0</span> |
Incorrectas: <span id="badCount">0</span> |
Errores pendientes: <span id="errorCount">0</span>
</div>

</div>

<script>

const SHEET_ID="1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY"

let frases=[]
let bloqueActual=[]
let errores=[]
let indice=0
let modoRepaso=false
let actual=null
let ok=0
let bad=0

async function cargar(){

let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`
let r=await fetch(url)
let t=await r.text()

let rows=t.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

let bloque=c[1]
let es=c[2]
let en=c[3]
let activa=c[4]

if(activa && activa.toLowerCase().includes("x")){

frases.push({
bloque:bloque.trim(),
es:es.trim(),
en:en.trim()
})

}

})

initBlocks()

}

function initBlocks(){

let blocks=[...new Set(frases.map(f=>f.bloque))]

let select=document.getElementById("blockSelect")

select.innerHTML=""

blocks.forEach(b=>{
let opt=document.createElement("option")
opt.value=b
opt.textContent=b
select.appendChild(opt)
})

select.addEventListener("change",startBlock)

startBlock()

}

function startBlock(){

let block=document.getElementById("blockSelect").value

bloqueActual=frases.filter(f=>f.bloque===block)

indice=0
errores=[]
modoRepaso=false

next()

}

function next(){

document.getElementById("answer").innerText=""

if(!modoRepaso){

if(indice>=bloqueActual.length){

modoRepaso=true

if(errores.length===0){

document.getElementById("es").innerText="Bloque completado 🎉"
return

}

}else{

actual=bloqueActual[indice]
indice++

}

}

if(modoRepaso){

if(errores.length===0){

document.getElementById("es").innerText="Repaso completado 🎉"
return

}

let i=Math.floor(Math.random()*errores.length)
actual=errores[i]

}

document.getElementById("es").innerText=actual.es

updateStats()

}

function showAnswer(){

document.getElementById("answer").innerText=actual.en

}

function markCorrect(){

ok++

errores=errores.filter(e=>e!==actual)

next()

}

function markWrong(){

bad++

if(!errores.includes(actual)){
errores.push(actual)
}

next()

}

function updateStats(){

document.getElementById("okCount").innerText=ok
document.getElementById("badCount").innerText=bad
document.getElementById("errorCount").innerText=errores.length

}

cargar()

</script>

</body>
</html>
