
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenamiento de frases</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:800px;margin:auto}
button{padding:10px 14px;margin:6px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.ok{background:#22c55e}
.bad{background:#ef4444;color:white}
.next{background:#38bdf8}
.answer{margin-top:15px;font-size:18px}
.es{font-size:30px;font-weight:bold;margin-top:20px}
</style>
</head>

<body>
<div class="card">
<h2>Entrenamiento de frases</h2>

<div id="es" class="es">Cargando...</div>

<div id="answer" class="answer"></div>

<button onclick="showAnswer()">Ver respuesta</button>
<button class="ok" onclick="markCorrect()">Correcto</button>
<button class="bad" onclick="markWrong()">Incorrecto</button>
<button class="next" onclick="next()">Siguiente</button>

</div>

<script>

const SHEET_ID="1cUZQJqSAb5zcRo84oBSX3MADx7zm_pSoR6zin8JDtbY"

let frases=[]
let errores=[]
let actual=null

async function cargar(){

let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`
let r=await fetch(url)
let t=await r.text()

let rows=t.split("\n").slice(1)

rows.forEach(r=>{
let c=r.split(",")
if(c[2]&&c[3]){
frases.push({
es:c[2],
en:c[3]
})
}
})

next()

}

function randomError(){
return errores[Math.floor(Math.random()*errores.length)]
}

function next(){

if(errores.length>0){
actual=randomError()
}else{
actual=frases[Math.floor(Math.random()*frases.length)]
}

document.getElementById("es").innerText=actual.es
document.getElementById("answer").innerText=""

}

function showAnswer(){
document.getElementById("answer").innerText=actual.en
}

function markCorrect(){
errores=errores.filter(e=>e!==actual)
}

function markWrong(){
if(!errores.includes(actual))errores.push(actual)
}

cargar()

</script>
</body>
</html>
